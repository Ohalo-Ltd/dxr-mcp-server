    case_sensitive: false
    confidence: 0.9

  # Invoice/Billing indicators
  - id: invoice_terms
    name: "Invoice Terms"
    description: "Terms indicating invoice and billing documents"
    terms:
      - "invoice"
      - "bill"
      - "billing statement"
      - "payment request"
      - "account statement"
      - "purchase order"
      - "PO"
      - "receipt"
      - "credit note"
      - "debit note"
      - "remittance"
      - "pro forma"
      - "proforma"
      - "quotation"
      - "quote"
      - "estimate"
      - "bill to"
      - "ship to"
      - "sold to"
      - "invoice date"
      - "due date"
      - "payment terms"
    match_type: "phrase"
    case_sensitive: false
    confidence: 0.9

  # Financial report indicators
  - id: financial_report_terms
    name: "Financial Report Terms"
    description: "Terms indicating financial reports and statements"
    terms:
      - "financial statement"
      - "income statement"
      - "balance sheet"
      - "cash flow"
      - "profit and loss"
      - "P&L"
      - "annual report"
      - "quarterly report"
      - "audit report"
      - "tax return"
      - "budget"
      - "forecast"
      - "financial projection"
      - "fiscal year"
      - "revenue"
      - "expenses"
      - "assets"
      - "liabilities"
      - "equity"
      - "amortization"
      - "depreciation"
    match_type: "phrase"
    case_sensitive: false
    confidence: 0.85

  # HR/Employee document indicators
  - id: hr_document_terms
    name: "HR Document Terms"
    description: "Terms indicating HR and employee documents"
    terms:
      - "resume"
      - "CV"
      - "curriculum vitae"
      - "cover letter"
      - "job application"
      - "offer letter"
      - "employment contract"
      - "employee handbook"
      - "HR policy"
      - "performance review"
      - "performance evaluation"
      - "termination letter"
      - "exit interview"
      - "onboarding"
      - "training manual"
      - "job description"
      - "salary"
      - "compensation"
      - "benefits"
    match_type: "phrase"
    case_sensitive: false
    confidence: 0.85

# =============================================================================
# LLM PROMPTS
# =============================================================================
llm_prompts:

  # Document type classifier
  - id: document_type_classifier
    name: "Document Type Classifier"
    description: "Classifies documents by type for search tasks"
    prompt: |
      Classify this document into one of the following types:

      - CONTRACT: Legal agreements, NDAs, service agreements, terms
      - INVOICE: Bills, invoices, payment requests, receipts
      - FINANCIAL_REPORT: Financial statements, P&L, balance sheets, audits
      - HR_DOCUMENT: Resumes, CVs, offer letters, employee records
      - TECHNICAL: Technical documentation, specifications, manuals
      - CORRESPONDENCE: Letters, memos, emails
      - OTHER: None of the above

      Answer with only the document type.

      Document excerpt:
      {content}
    output_schema:
      type: "string"
      enum: ["CONTRACT", "INVOICE", "FINANCIAL_REPORT", "HR_DOCUMENT",
             "TECHNICAL", "CORRESPONDENCE", "OTHER"]
    temperature: 0.1
    max_tokens: 50

  # Author extraction
  - id: author_extractor
    name: "Author Extractor"
    description: "Extracts author information from documents"
    prompt: |
      Extract author/creator information from this document.

      Look for:
      - Author field
      - Prepared by
      - Created by
      - Written by
      - Signatures
      - Names in headers/footers

      Where did you find the author information?
      Answer with only the source location.

      Document excerpt:
      {content}
    output_schema:
      type: "string"
      enum: ["METADATA", "HEADER", "FOOTER", "BODY", "SIGNATURE", "UNCLEAR"]
    temperature: 0.1
    max_tokens: 50

  # Date extraction
  - id: date_extractor
    name: "Date Extractor"
    description: "Extracts the primary document date"
    prompt: |
      Extract the primary document date from this document.

      Look for creation date, document date, or effective date.
      Format as YYYY-MM-DD.

      Answer with only the date, or "UNKNOWN" if not found.

      Document excerpt:
      {content}
    output_schema:
      type: "string"
      description: "Document date in YYYY-MM-DD format or UNKNOWN"
    temperature: 0.1
    max_tokens: 50

# =============================================================================
# COMPOSITE RULES
# =============================================================================
composite_rules:

  # Confirmed contract document
  - id: confirmed_contract
    name: "Confirmed Contract"
    description: "Document confirmed to be a contract/agreement"
    conditions:
      - dictionary: "contract_terms"
      - any:
          - regex: "contract_number"
          - regex: "effective_date"
          - regex: "expiration_date"
    minimum_matches: 2
    output_label: "Contract Document"
    confidence_threshold: 0.85

  # Confirmed invoice
  - id: confirmed_invoice
    name: "Confirmed Invoice"
    description: "Document confirmed to be an invoice"
    conditions:
      - dictionary: "invoice_terms"
      - any:
          - regex: "invoice_number"
          - regex: "invoice_total"
          - regex: "due_date"
    minimum_matches: 2
    output_label: "Invoice Document"
    confidence_threshold: 0.85

  # Loan document
  - id: loan_document
    name: "Loan Document"
    description: "Document related to loans"
    conditions:
      - any:
          - regex: "interest_rate"
          - regex: "loan_amount"
      - dictionary: "contract_terms"
    minimum_matches: 2
    output_label: "Loan Document"
    confidence_threshold: 0.8

# =============================================================================
# OUTPUT LABELS
# =============================================================================
labels:
  - name: "Contract Document"
    color: "#6366F1"
    severity: "medium"
    domain: "Legal"

  - name: "Invoice Document"
    color: "#F59E0B"
    severity: "low"
    domain: "Financially Sensitive"

  - name: "Financial Report"
    color: "#10B981"
    severity: "medium"
    domain: "Financially Sensitive"

  - name: "HR Document"
    color: "#8B5CF6"
    severity: "medium"
    domain: "PII"

  - name: "Loan Document"
    color: "#EF4444"
    severity: "medium"
    domain: "Financially Sensitive"

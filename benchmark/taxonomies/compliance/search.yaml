# Search Task Detection Taxonomy
# Supports: search-001 through search-007
#
# Detects document types for search tasks including:
# - Contracts and legal agreements
# - Invoices and billing documents
# - Financial reports and statements
# - HR and employee documents
# - Author attribution patterns
# - Date patterns for temporal searches

id: search-documents
name: "Search Document Types"
version: "1.0.0"
domain: "Document Classification"
tasks:
  - "search-001: Find Contracts by Date"
  - "search-002: Invoice Discovery"
  - "search-003: Large PDF Search"
  - "search-004: Cross-Folder Search"
  - "search-005: Specific Author Search"
  - "search-006: Recent Modifications"
  - "search-007: File Type Distribution"

# =============================================================================
# REGULAR EXPRESSION PATTERNS
# =============================================================================
regex_patterns:

  # Contract/Agreement Number patterns
  - id: contract_number
    name: "Contract Number"
    description: "Detects contract and agreement reference numbers"
    patterns:
      - "\\b(Contract|Agreement)\\s*(No\\.?|Number|#)[:\\s]*([A-Z0-9]{4,15})\\b"
      - "\\b(MSA|SOW|NDA)[-_]?[0-9]{4,10}\\b"
      - "\\bRef[:\\.\\s]*(Contract|Agreement)[:\\s]*([A-Z0-9-]{5,20})\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "contract"

  # Invoice Number patterns
  - id: invoice_number
    name: "Invoice Number"
    description: "Detects invoice identifiers"
    patterns:
      - "\\b(Invoice|Inv)\\s*(No\\.?|Number|#)[:\\s]*([A-Z0-9]{4,15})\\b"
      - "\\bINV[-_]?[0-9]{4,12}\\b"
      - "\\bPO[-_]?(No\\.?|Number|#)?[:\\s]*([A-Z0-9]{4,12})\\b"
    case_sensitive: false
    confidence: 0.9
    document_type: "invoice"

  # Currency/Amount patterns
  - id: currency_amount
    name: "Currency Amount"
    description: "Detects monetary amounts with currency symbols"
    patterns:
      # USD
      - "\\$[0-9]{1,3}(,[0-9]{3})*(\\.\\d{2})?\\b"
      # EUR
      - "\\b[0-9]{1,3}([,\\.][0-9]{3})*([,\\.][0-9]{2})?\\s*(EUR|\\u20AC)\\b"
      - "\\b(EUR|\\u20AC)\\s*[0-9]{1,3}([,\\.][0-9]{3})*([,\\.][0-9]{2})?\\b"
      # GBP
      - "\\u00A3[0-9]{1,3}(,[0-9]{3})*(\\.\\d{2})?\\b"
      # Generic with currency code
      - "\\b[0-9]{1,3}([,\\.][0-9]{3})*([,\\.][0-9]{2})?\\s*(USD|GBP|CAD|AUD)\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "financial"

  # Date patterns (various formats)
  - id: document_date
    name: "Document Date"
    description: "Detects dates in common document formats"
    patterns:
      # ISO format
      - "\\b(20[0-9]{2})[-/](0[1-9]|1[0-2])[-/](0[1-9]|[12][0-9]|3[01])\\b"
      # US format MM/DD/YYYY
      - "\\b(0[1-9]|1[0-2])[-/](0[1-9]|[12][0-9]|3[01])[-/](20[0-9]{2})\\b"
      # EU format DD/MM/YYYY
      - "\\b(0[1-9]|[12][0-9]|3[01])[-/](0[1-9]|1[0-2])[-/](20[0-9]{2})\\b"
      # Written format
      - "\\b(January|February|March|April|May|June|July|August|September|October|November|December)\\s+[0-9]{1,2},?\\s+20[0-9]{2}\\b"
      - "\\b[0-9]{1,2}\\s+(January|February|March|April|May|June|July|August|September|October|November|December)\\s+20[0-9]{2}\\b"
    case_sensitive: false
    confidence: 0.8
    document_type: "dated_document"

  # Due date patterns (for invoices)
  - id: due_date
    name: "Due Date"
    description: "Detects payment due dates on invoices"
    patterns:
      - "\\b(Due\\s+Date|Payment\\s+Due|Due\\s+By)[:\\s]*([0-9]{1,2}[-/][0-9]{1,2}[-/][0-9]{2,4})\\b"
      - "\\b(Net\\s+[0-9]{1,3}|Due\\s+on\\s+Receipt)\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "invoice"

  # Author/Prepared by patterns
  - id: author_attribution
    name: "Author Attribution"
    description: "Detects author and prepared by fields"
    patterns:
      - "\\b(Author|Prepared\\s+By|Created\\s+By|Written\\s+By)[:\\s]*([A-Z][a-z]+\\s+[A-Z][a-z]+)\\b"
      - "\\b(Author|Prepared\\s+By)[:\\s]*([A-Z]{1,2}[a-z]*\\s*[A-Z][a-z]+)\\b"
    case_sensitive: false
    confidence: 0.8
    document_type: "authored_document"

  # Effective date patterns (for contracts)
  - id: effective_date
    name: "Effective Date"
    description: "Detects contract effective dates"
    patterns:
      - "\\b(Effective\\s+Date|Commencement\\s+Date|Start\\s+Date)[:\\s]*([0-9]{1,2}[-/][0-9]{1,2}[-/][0-9]{2,4})\\b"
      - "\\beffective\\s+as\\s+of\\s+([A-Z][a-z]+\\s+[0-9]{1,2},?\\s+20[0-9]{2})\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "contract"

  # Expiration/Termination patterns
  - id: expiration_date
    name: "Expiration Date"
    description: "Detects contract expiration and termination dates"
    patterns:
      - "\\b(Expiration\\s+Date|Termination\\s+Date|End\\s+Date|Expires)[:\\s]*([0-9]{1,2}[-/][0-9]{1,2}[-/][0-9]{2,4})\\b"
      - "\\b(valid\\s+until|expires\\s+on)\\s+([A-Z][a-z]+\\s+[0-9]{1,2},?\\s+20[0-9]{2})\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "contract"

  # Total/Subtotal patterns (for invoices)
  - id: invoice_total
    name: "Invoice Total"
    description: "Detects invoice total and subtotal amounts"
    patterns:
      - "\\b(Total|Subtotal|Grand\\s+Total|Amount\\s+Due|Balance\\s+Due)[:\\s]*(\\$|\\u20AC|\\u00A3)?\\s*[0-9]{1,3}([,\\.][0-9]{3})*([,\\.][0-9]{2})?\\b"
      - "\\b(Tax|VAT|GST)[:\\s]*(\\$|\\u20AC|\\u00A3)?\\s*[0-9]{1,3}([,\\.][0-9]{3})*([,\\.][0-9]{2})?\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "invoice"

  # Loan/Interest rate patterns
  - id: interest_rate
    name: "Interest Rate"
    description: "Detects interest rates in loan documents"
    patterns:
      - "\\b(Interest\\s+Rate|APR|Annual\\s+Rate)[:\\s]*([0-9]{1,2}([,\\.][0-9]{1,4})?\\s*%)\\b"
      - "\\b[0-9]{1,2}([,\\.][0-9]{1,4})?\\s*%\\s*(interest|per\\s+annum|APR)\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "loan"

  # Principal/Loan amount patterns
  - id: loan_amount
    name: "Loan Amount"
    description: "Detects principal and loan amounts"
    patterns:
      - "\\b(Principal|Loan\\s+Amount|Principal\\s+Amount)[:\\s]*(\\$|\\u20AC|\\u00A3)?\\s*[0-9]{1,3}([,\\.][0-9]{3})*([,\\.][0-9]{2})?\\b"
    case_sensitive: false
    confidence: 0.85
    document_type: "loan"

# =============================================================================

      - "contract"
      - "terms and conditions"
      - "terms of service"
      - "service agreement"
      - "license agreement"
      - "NDA"
      - "non-disclosure"
      - "confidentiality agreement"
      - "lease agreement"
      - "loan agreement"
      - "purchase agreement"
      - "sales agreement"
      - "vendor agreement"
      - "supplier agreement"
      - "partnership agreement"
      - "employment agreement"
      - "consulting agreement"
      - "master services agreement"
      - "MSA"
      - "statement of work"
      - "SOW"
      - "memorandum of understanding"
      - "MOU"
      - "amendment"
      - "addendum"

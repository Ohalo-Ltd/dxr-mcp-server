id: "search-001"
name: "Find Contracts by Date"
description: "Locate contracts signed within a specific time period"
category: "search"
domain: "Contracts"
difficulty: "medium"

prompt: |
  Find all contract and agreement documents in the file repository.
  List the contracts with their type and any relevant dates or terms
  you can extract from them.

ground_truth:
  expected_files:
    - id: "Sample evaluation agreement.docx"
      relevance: 1.0
      reason: "Evaluation agreement contract"
    - id: "Loan_Agreement_1.docx"
      relevance: 1.0
      reason: "Loan agreement contract"
    - id: "loan.pdf"
      relevance: 1.0
      reason: "Loan documentation"
    - id: "interest-free-loan-agreement.pdf"
      relevance: 1.0
      reason: "Interest-free loan agreement"
  forbidden_files: []
  minimum_precision: 0.6
  minimum_recall: 0.8

execution:
  timeout_seconds: 90
  max_tool_calls: 15
  dxr_hints:
    expected_tools:
      - "list_file_metadata"
    expected_queries:
      - 'labels.name:"Contract"'
      - 'extractedMetadata.effectiveDate > "2024-01-01"'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: false

tags:
  - "contracts"
  - "legal"
  - "date-filter"

id: "search-003"
name: "Large PDF Search"
description: "Find PDF files larger than 100KB"
category: "search"
domain: "File Size"
difficulty: "easy"

prompt: |
  Find all PDF documents that are larger than 100KB. List them by size
  in descending order with their names and locations.

ground_truth:
  expected_files:
    - id: "james-gibb-sample-invoice.pdf"
      relevance: 1.0
      reason: "Invoice PDF - 520KB"
    - id: "Academic CV template.pdf"
      relevance: 1.0
      reason: "CV template PDF - 252KB"
    - id: "defining-issues-18-2-sec-cybersecurity.pdf"
      relevance: 1.0
      reason: "SEC cybersecurity document - 181KB"
  forbidden_files: []
  minimum_precision: 0.8
  minimum_recall: 0.8

execution:
  timeout_seconds: 60
  max_tool_calls: 10
  dxr_hints:
    expected_tools:
      - "list_file_metadata"
    expected_queries:
      - 'mimeType:"application/pdf" AND size > 102400'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: false

tags:
  - "pdf"
  - "large-files"
  - "storage"

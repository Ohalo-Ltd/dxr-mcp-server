id: "search-002"
name: "Invoice Discovery"
description: "Find all invoice documents"
category: "search"
domain: "Invoices"
difficulty: "easy"

prompt: |
  Find all invoice documents in the file system. List each invoice with
  its invoice number, amount, vendor, and due date if available.

ground_truth:
  expected_files:
    - id: "Invoice_1.pdf"
      relevance: 1.0
      reason: "Standard invoice document"
    - id: "Invoice_2.pdf"
      relevance: 1.0
      reason: "Standard invoice document"
    - id: "Invoice_3.pdf"
      relevance: 1.0
      reason: "Standard invoice document"
    - id: "Invoice_4.pdf"
      relevance: 1.0
      reason: "Standard invoice document"
    - id: "CD-invoice-1.pdf"
      relevance: 1.0
      reason: "CD/product invoice"
    - id: "james-gibb-sample-invoice.pdf"
      relevance: 1.0
      reason: "Named invoice document"
    - id: "wordpress-pdf-invoice-plugin-sample.pdf"
      relevance: 1.0
      reason: "Plugin-generated invoice sample"
  forbidden_files: []
  minimum_precision: 0.8
  minimum_recall: 0.9

execution:
  timeout_seconds: 60
  max_tool_calls: 10
  dxr_hints:
    expected_tools:
      - "list_file_metadata"
    expected_queries:
      - 'labels.name:"Invoice"'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: false

tags:
  - "invoices"
  - "finance"
  - "accounts-payable"

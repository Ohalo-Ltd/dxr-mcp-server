id: "search-006"
name: "Recent Sensitive Financial Files"
description: "Find sensitive financial files modified recently"
category: "search"
domain: "Date + Content Filter"
difficulty: "medium"

prompt: |
  Find all files containing sensitive financial data (credit cards, payroll,
  bank statements, etc.) that have been modified in the last 30 days.
  List them with their types and any sensitivity indicators.

ground_truth:
  expected_files:
    # PCI-labeled files with financial data
    - id: "CardBase"
      relevance: 1.0
      reason: "PCI confirmed cardholder data - credit card numbers"
    - id: "credit-card-numbers_extradata"
      relevance: 1.0
      reason: "Credit card data file"
    - id: "credit card screenshot.png"
      relevance: 1.0
      reason: "Credit card image - PCI sensitive"
    # Financial data with governance labels
    - id: "Payroll_Sum_2023_final_ABC123_JD_Smith_Q4"
      relevance: 1.0
      reason: "Payroll data - highly sensitive financial"
    - id: "2011_audited_financial_statement_msword.doc"
      relevance: 0.8
      reason: "Audited financial statement"
    - id: "Bank-Statement.jpg"
      relevance: 0.8
      reason: "Bank statement image"
  forbidden_files: []
  minimum_precision: 0.5
  minimum_recall: 0.7

execution:
  timeout_seconds: 90
  max_tool_calls: 15
  dxr_hints:
    expected_tools:
      - "list_file_metadata"
    expected_queries:
      - 'lastModifiedAt > now-30d AND labels.name:"PCI: Confirmed Cardholder Data"'
      - 'lastModifiedAt > now-30d AND labels.name:"Governance: Highly Sensitive Financial Data"'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: false

tags:
  - "recent"
  - "financial"
  - "date-filter"
  - "combined-query"

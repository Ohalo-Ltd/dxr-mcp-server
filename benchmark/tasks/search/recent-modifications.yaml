id: "search-006"
name: "Recent Modifications"
description: "Find files modified recently"
category: "search"
domain: "Recent Files"
difficulty: "easy"

prompt: |
  Find all files that have been modified in the last 30 days.
  List them with their last modification dates.

# Note: This task tests date-based filtering capability.
# Expected files will depend on when documents were indexed in DXR.
# The ground_truth below is a placeholder - actual results will vary
# based on indexing time.
ground_truth:
  expected_files:
    # Placeholder - all files were copied on Feb 7, 2025
    # In live mode, this should return files based on actual modification dates
    - id: "PMR_SmithJ_2023_Final_v3_AB1234_XYZ.txt"
      relevance: 0.5
      reason: "Recently indexed file"
  forbidden_files: []
  # Lower thresholds since results depend on timing
  minimum_precision: 0.3
  minimum_recall: 0.3

execution:
  timeout_seconds: 60
  max_tool_calls: 10
  dxr_hints:
    expected_tools:
      - "list_file_metadata"
    expected_queries:
      - 'lastModifiedAt > "2024-03-01"'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: false

tags:
  - "recent"
  - "modifications"
  - "date-filter"

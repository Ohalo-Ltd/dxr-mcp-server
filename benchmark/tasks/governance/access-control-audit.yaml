id: "governance-001"
name: "Sensitive Files with Sharing Risks"
description: "Find sensitive files that have external sharing risks"
category: "governance"
domain: "Access Control + Sharing"
difficulty: "medium"

prompt: |
  Find sensitive files (financial data, PII, health records) that have been
  flagged with external sharing risks. These represent potential data
  exfiltration concerns. List each file with its sensitivity classification
  and sharing risk status.

ground_truth:
  # Files that have BOTH sensitive data labels AND external sharing risk label
  # This tests DXR's ability to combine access control + content classification
  expected_files:
    # Sample evaluation agreement has both GDPR PII and External Sharing Risk labels
    - id: "Sample evaluation agreement"
      relevance: 1.0
      reason: "Has GDPR: Confirmed Employee PII AND Governance: External Sharing Risk"
    # james-gibb-sample-invoice has financial data and external sharing risk
    - id: "james-gibb-sample-invoice.pdf"
      relevance: 0.9
      reason: "Invoice with financial data flagged for external sharing"
    # Bank statement - sensitive financial with sharing indicators
    - id: "Bank-Statement.jpg"
      relevance: 0.8
      reason: "Financial document with potential sharing exposure"
  forbidden_files: []
  minimum_precision: 0.4
  minimum_recall: 0.6

execution:
  timeout_seconds: 120
  max_tool_calls: 15
  dxr_hints:
    expected_tools:
      - "get_classifications"
      - "list_file_metadata"
    expected_queries:
      - 'labels.name:"Governance: External Sharing Risk"'
      - 'labels.name:"Governance: External Sharing Risk" AND (labels.name:"PCI: Confirmed Cardholder Data" OR labels.name:"GDPR: Confirmed Employee PII" OR labels.name:"Governance: Highly Sensitive Financial Data")'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: false

tags:
  - "access-control"
  - "external-sharing"
  - "governance"
  - "combined-query"

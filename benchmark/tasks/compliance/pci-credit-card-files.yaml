id: "compliance-004"
name: "PCI Credit Card Files"
description: "Find documents containing payment card data"
category: "compliance"
domain: "PCI-DSS"
difficulty: "medium"

prompt: |
  Identify all documents that contain payment card data including credit card
  numbers, CVVs, and expiration dates. These files are within PCI-DSS compliance
  scope and require special handling. List all files and the types of card data
  they contain.

ground_truth:
  expected_files:
    - id: "credit-card-numbers_extradata"
      relevance: 1.0
      reason: "File containing credit card numbers with metadata"
    - id: "CardBase"
      relevance: 1.0
      reason: "Payment card database with card numbers"
    - id: "credit card screenshot.png"
      relevance: 1.0
      reason: "Image of credit card - OCR test for visual PAN detection"
  forbidden_files: []
  minimum_precision: 0.8
  minimum_recall: 0.9

execution:
  timeout_seconds: 120
  max_tool_calls: 20
  dxr_hints:
    expected_tools:
      - "get_classifications"
      - "list_file_metadata"
    expected_queries:
      - 'labels.name:"PCI: Confirmed Cardholder Data"'
      - 'annotators.domain.name:"Financially Sensitive"'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: true
  sensitive_data_domains:
    - "PCI"
    - "Financially Sensitive"

tags:
  - "pci"
  - "financial"
  - "credit-card"
  - "regulated"

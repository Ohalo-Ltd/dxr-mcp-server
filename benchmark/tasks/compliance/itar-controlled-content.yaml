id: "compliance-003"
name: "ITAR Controlled Content"
description: "Locate documents subject to ITAR export controls"
category: "compliance"
domain: "ITAR"
difficulty: "hard"

prompt: |
  Find all documents that are subject to International Traffic in Arms Regulations
  (ITAR) export controls. These typically include defense-related technical data,
  specifications, and research documents. List the files and their classification
  level.

ground_truth:
  expected_files:
    # ITAR Confirmed Documents (have ITAR: Confirmed ITAR Controlled label)
    - id: "ITAR_Sample_1.pdf"
      relevance: 1.0
      reason: "Export-controlled technical data"
    - id: "ITAR_Sample_2.pdf"
      relevance: 1.0
      reason: "Defense article specifications"
    - id: "ITAR_Sample_3.pdf"
      relevance: 1.0
      reason: "Military technology documentation"
    - id: "Submarine schematic"
      relevance: 1.0
      reason: "Naval defense specifications - ITAR controlled"
    - id: "Missile launch systems"
      relevance: 1.0
      reason: "Weapons system documentation - ITAR controlled"
  forbidden_files: []
  minimum_precision: 0.8
  minimum_recall: 0.8

execution:
  timeout_seconds: 120
  max_tool_calls: 20
  dxr_hints:
    expected_tools:
      - "get_classifications"
      - "list_file_metadata"
    expected_queries:
      - 'labels.name:"ITAR: Confirmed ITAR Controlled"'
      - 'annotators.domain.name:"ITAR"'

compliance:
  must_respect_access_controls: true
  must_not_expose_raw_pii: false
  sensitive_data_domains:
    - "ITAR"
    - "Export Control"

tags:
  - "itar"
  - "export-control"
  - "defense"
  - "regulated"
